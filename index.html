<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1a3a2a" />
  <title>Golden Nails Fleet</title>
  <link rel="manifest" href="manifest.json" />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --green-dark:  #1a3a2a;
      --green-mid:   #2d6a4f;
      --green-light: #52b788;
      --gold:        #d4a017;
      --gold-light:  #f0c040;
      --bg:          #f5f7f5;
      --card:        #ffffff;
      --text:        #1a2a1a;
      --muted:       #6b7c6b;
      --danger:      #c0392b;
      --warning:     #e67e22;
      --radius:      12px;
      --shadow:      0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    body.lang-en { font-family: 'Inter', sans-serif; }

    /* Lang toggle */
    .lang-btn {
      background: rgba(255,255,255,0.15); border: 1.5px solid rgba(255,255,255,0.3);
      color: #fff; border-radius: 20px; padding: 4px 12px;
      font-size: 13px; font-weight: 700; cursor: pointer;
      font-family: inherit;
    }
    .lang-btn:hover { background: rgba(255,255,255,0.25); }

    /* AUTH */
    #auth-screen {
      min-height: 100vh;
      background: linear-gradient(160deg, var(--green-dark) 0%, var(--green-mid) 100%);
      display: flex; align-items: center; justify-content: center; padding: 24px;
    }
    .auth-card {
      background: var(--card); border-radius: 20px; padding: 36px 28px;
      width: 100%; max-width: 380px; box-shadow: 0 8px 32px rgba(0,0,0,0.18);
    }
    .auth-logo { text-align: center; margin-bottom: 28px; }
    .auth-logo .icon { font-size: 48px; }
    .auth-logo h1 { font-size: 22px; font-weight: 900; color: var(--green-dark); margin-top: 8px; }
    .auth-logo p  { font-size: 13px; color: var(--muted); }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 13px; font-weight: 600; color: var(--muted); margin-bottom: 6px; }
    .form-group input {
      width: 100%; padding: 12px 14px; border: 1.5px solid #dde8dd;
      border-radius: var(--radius); font-family: inherit;
      font-size: 15px; outline: none; transition: border 0.2s;
    }
    .form-group input:focus { border-color: var(--green-light); }
    .btn-primary {
      width: 100%; padding: 13px; background: var(--green-mid);
      color: #fff; border: none; border-radius: var(--radius);
      font-family: inherit; font-size: 16px; font-weight: 700;
      cursor: pointer; transition: background 0.2s;
    }
    .btn-primary:hover { background: var(--green-dark); }
    .auth-error { color: var(--danger); font-size: 13px; text-align: center; margin-top: 10px; display: none; }
    .auth-lang { text-align: center; margin-top: 16px; }
    .auth-lang button {
      background: none; border: 1.5px solid #dde8dd; color: var(--muted);
      border-radius: 20px; padding: 5px 16px; font-size: 13px;
      font-weight: 700; cursor: pointer; font-family: inherit;
    }

    /* APP SHELL */
    #app { display: none; flex-direction: column; min-height: 100vh; }
    .app-header {
      background: var(--green-dark); color: #fff;
      padding: 14px 16px; display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }
    .app-header h2 { font-size: 17px; font-weight: 700; }
    .header-actions { display: flex; gap: 8px; align-items: center; }
    .btn-icon {
      background: rgba(255,255,255,0.12); border: none; color: #fff;
      width: 36px; height: 36px; border-radius: 50%; cursor: pointer;
      font-size: 18px; display: flex; align-items: center; justify-content: center;
    }

    .main-content { flex: 1; padding: 16px; max-width: 600px; margin: 0 auto; width: 100%; }

    .nav-tabs {
      display: flex; background: var(--card); border-radius: var(--radius);
      padding: 4px; margin-bottom: 16px; box-shadow: var(--shadow); gap: 4px;
    }
    .nav-tab {
      flex: 1; padding: 9px 4px; border: none; background: transparent;
      font-family: inherit; font-size: 13px; font-weight: 600;
      color: var(--muted); border-radius: 8px; cursor: pointer; transition: all 0.2s;
    }
    .nav-tab.active { background: var(--green-mid); color: #fff; }

    .card {
      background: var(--card); border-radius: var(--radius);
      padding: 16px; margin-bottom: 12px; box-shadow: var(--shadow);
    }
    .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .card-title { font-size: 16px; font-weight: 700; }
    .card-subtitle { font-size: 12px; color: var(--muted); margin-top: 2px; }

    .stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
    .stat-card {
      background: var(--card); border-radius: var(--radius);
      padding: 14px; box-shadow: var(--shadow); text-align: center;
    }
    .stat-value { font-size: 26px; font-weight: 900; color: var(--green-mid); }
    .stat-label { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .stat-card.gold .stat-value { color: var(--gold); }
    .stat-card.danger .stat-value { color: var(--danger); }

    .machine-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 0; border-bottom: 1px solid #eef2ee;
    }
    .machine-item:last-child { border-bottom: none; }
    .machine-info { flex: 1; }
    .machine-name { font-size: 15px; font-weight: 700; }
    .machine-meta { font-size: 12px; color: var(--muted); margin-top: 3px; }
    .machine-status {
      font-size: 11px; font-weight: 700; padding: 4px 10px;
      border-radius: 20px; margin-left: 6px;
    }
    .status-ok     { background: #e8f5e9; color: #2e7d32; }
    .status-maint  { background: #fff3e0; color: var(--warning); }
    .status-broken { background: #ffebee; color: var(--danger); }

    .btn-sm {
      padding: 6px 12px; border-radius: 8px; border: none;
      font-family: inherit; font-size: 12px; font-weight: 600;
      cursor: pointer; margin-right: 4px;
    }
    .btn-outline { background: transparent; border: 1.5px solid var(--green-light); color: var(--green-mid); }
    .btn-danger-sm { background: #ffebee; color: var(--danger); }

    .cost-badge {
      font-size: 13px; font-weight: 700; color: var(--gold);
      background: #fdf3d0; padding: 4px 10px; border-radius: 20px;
    }

    .section-title {
      font-size: 13px; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: 1px; margin: 20px 0 10px;
    }

    .fab {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: var(--gold); color: var(--green-dark);
      border: none; border-radius: 50px; padding: 14px 28px;
      font-family: inherit; font-size: 15px; font-weight: 900;
      cursor: pointer; box-shadow: 0 4px 16px rgba(212,160,23,0.4);
      display: flex; align-items: center; gap: 8px; z-index: 50;
    }

    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.5); z-index: 200;
      align-items: flex-end; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--card); border-radius: 20px 20px 0 0;
      padding: 24px 20px 36px; width: 100%; max-width: 600px;
      max-height: 90vh; overflow-y: auto;
      animation: slideUp 0.3s ease;
    }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .modal-title { font-size: 18px; font-weight: 900; margin-bottom: 20px; color: var(--green-dark); }
    .modal-close {
      float: left; background: none; border: none; font-size: 22px;
      cursor: pointer; color: var(--muted); line-height: 1;
    }
    .modal .form-group input,
    .modal .form-group select,
    .modal .form-group textarea {
      width: 100%; padding: 11px 13px; border: 1.5px solid #dde8dd;
      border-radius: var(--radius); font-family: inherit;
      font-size: 14px; outline: none;
    }
    .modal .form-group select { background: #fff; }
    .modal .form-group textarea { resize: vertical; min-height: 80px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .report-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 0; border-bottom: 1px solid #eef2ee;
    }
    .report-row:last-child { border-bottom: none; }
    .report-label { font-size: 14px; color: var(--muted); }
    .report-value { font-size: 15px; font-weight: 700; }
    .report-total {
      background: var(--green-dark); color: #fff;
      border-radius: var(--radius); padding: 14px 16px;
      display: flex; justify-content: space-between; align-items: center; margin-top: 12px;
    }
    .report-total span:first-child { font-size: 15px; }
    .report-total span:last-child  { font-size: 20px; font-weight: 900; color: var(--gold-light); }

    .loader { text-align: center; padding: 40px; color: var(--muted); font-size: 14px; }
    .tag { display: inline-block; font-size: 11px; padding: 3px 8px; border-radius: 10px; font-weight: 600; margin-left: 6px; }
    .tag-admin { background: #e8f5e9; color: #2e7d32; }
    .tag-user  { background: #e3f2fd; color: #1565c0; }
    .empty { text-align: center; padding: 40px 20px; color: var(--muted); }
    .empty .emoji { font-size: 40px; margin-bottom: 12px; }
    .empty p { font-size: 14px; }
    .alert-bubble {
      background: #fff3e0; border-right: 4px solid var(--warning);
      border-radius: var(--radius); padding: 12px 14px; margin-bottom: 10px; font-size: 13px;
    }
    .alert-bubble.danger { background: #ffebee; border-color: var(--danger); }

    /* LTR overrides for English */
    body.lang-en { direction: ltr; }
    body.lang-en .alert-bubble { border-right: none; border-left: 4px solid var(--warning); }
    body.lang-en .alert-bubble.danger { border-left-color: var(--danger); }
    body.lang-en .modal-close { float: right; }
    body.lang-en .machine-status { margin-left: 0; margin-right: 6px; }
    body.lang-en .btn-sm { margin-right: 0; margin-left: 4px; }
  </style>
</head>
<body>

<!-- AUTH -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="icon">🚜</div>
      <h1>Golden Nails Fleet</h1>
      <p data-ar="نظام إدارة الأسطول الزراعي" data-en="Agricultural Fleet Management System"></p>
    </div>
    <div class="form-group">
      <label data-ar="البريد الإلكتروني" data-en="Email"></label>
      <input type="email" id="login-email" />
    </div>
    <div class="form-group">
      <label data-ar="كلمة المرور" data-en="Password"></label>
      <input type="password" id="login-pass" />
    </div>
    <button class="btn-primary" onclick="doLogin()" data-ar="دخول" data-en="Login"></button>
    <p class="auth-error" id="auth-error" data-ar="بيانات خاطئة، حاول مجدداً" data-en="Wrong credentials, try again"></p>
    <div class="auth-lang">
      <button onclick="toggleLang()" id="auth-lang-btn">English</button>
    </div>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <header class="app-header">
    <h2>🚜 Golden Nails Fleet</h2>
    <div class="header-actions">
      <button class="lang-btn" onclick="toggleLang()" id="app-lang-btn">EN</button>
      <span id="user-tag" class="tag"></span>
      <button class="btn-icon" onclick="doLogout()" title="Logout">🚪</button>
    </div>
  </header>

  <div class="main-content">
    <div class="nav-tabs">
      <button class="nav-tab active" onclick="showTab('dashboard')" data-ar="الرئيسية" data-en="Dashboard"></button>
      <button class="nav-tab" onclick="showTab('machines')" data-ar="الآليات" data-en="Machines"></button>
      <button class="nav-tab" onclick="showTab('costs')" data-ar="التكاليف" data-en="Costs"></button>
      <button class="nav-tab admin-only" onclick="showTab('reports')" data-ar="التقارير" data-en="Reports" style="display:none"></button>
    </div>

    <!-- DASHBOARD -->
    <div id="tab-dashboard">
      <div class="stats-row">
        <div class="stat-card"><div class="stat-value" id="stat-total">—</div><div class="stat-label" data-ar="إجمالي الآليات" data-en="Total Machines"></div></div>
        <div class="stat-card gold"><div class="stat-value" id="stat-cost">—</div><div class="stat-label" data-ar="إجمالي التكاليف $" data-en="Total Costs $"></div></div>
        <div class="stat-card"><div class="stat-value" id="stat-maint">—</div><div class="stat-label" data-ar="قيد الصيانة" data-en="In Maintenance"></div></div>
        <div class="stat-card danger"><div class="stat-value" id="stat-broken">—</div><div class="stat-label" data-ar="أعطال" data-en="Breakdowns"></div></div>
      </div>
      <div class="section-title" data-ar="آخر التنبيهات" data-en="Latest Alerts"></div>
      <div id="alerts-list"><div class="loader" data-ar="جاري التحميل..." data-en="Loading..."></div></div>
    </div>

    <!-- MACHINES -->
    <div id="tab-machines" style="display:none">
      <div id="machines-list"><div class="loader" data-ar="جاري التحميل..." data-en="Loading..."></div></div>
    </div>

    <!-- COSTS -->
    <div id="tab-costs" style="display:none">
      <div id="costs-list"><div class="loader" data-ar="جاري التحميل..." data-en="Loading..."></div></div>
    </div>

    <!-- REPORTS -->
    <div id="tab-reports" style="display:none">
      <div id="reports-content"><div class="loader" data-ar="جاري التحميل..." data-en="Loading..."></div></div>
    </div>
  </div>

  <button class="fab admin-only" id="fab-btn" onclick="openAddMachine()" style="display:none">
    <span data-ar="＋ إضافة آلية" data-en="＋ Add Machine"></span>
  </button>
</div>

<!-- MODAL: Add Machine -->
<div class="modal-overlay" id="modal-machine">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('modal-machine')">✕</button>
    <div class="modal-title" data-ar="➕ إضافة آلية جديدة" data-en="➕ Add New Machine"></div>
    <div class="form-group">
      <label data-ar="اسم الآلية" data-en="Machine Name"></label>
      <input type="text" id="m-name" data-ar-placeholder="مثال: حصادة هوندا #1" data-en-placeholder="e.g. Honda Trimmer #1" />
    </div>
    <div class="form-row">
      <div class="form-group">
        <label data-ar="النوع" data-en="Type"></label>
        <select id="m-type">
          <option>Hedge Trimmer</option><option>Blower</option><option>Push Mower</option>
          <option>Brush Cutter</option><option>Small Tractor</option><option>Spray Machine</option>
          <option>SAW</option><option>Lawn Mower</option><option>Tractor</option>
          <option>Grass Edging Machine</option><option>Aerator Machine</option><option>Other / أخرى</option>
        </select>
      </div>
      <div class="form-group">
        <label data-ar="الماركة" data-en="Brand"></label>
        <input type="text" id="m-brand" placeholder="Honda, Makita..." />
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label data-ar="المشروع" data-en="Project"></label>
        <select id="m-project">
          <option>1 Group</option><option>14 Group</option><option>8th Group</option>
          <option>Egla Gardens</option><option>MOEHE</option><option>Q.U(2)</option>
          <option>QU</option><option>Store</option><option>U.C.C</option>
        </select>
      </div>
      <div class="form-group">
        <label data-ar="رقم الآلية" data-en="Machine No."></label>
        <input type="text" id="m-number" placeholder="GNF-001" />
      </div>
    </div>
    <div class="form-group">
      <label data-ar="الحالة" data-en="Status"></label>
      <select id="m-status">
        <option value="ok" data-ar="✅ شغالة" data-en="✅ Operational"></option>
        <option value="maint" data-ar="🔧 صيانة" data-en="🔧 Maintenance"></option>
        <option value="broken" data-ar="🔴 عطل" data-en="🔴 Breakdown"></option>
      </select>
    </div>
    <div class="form-group">
      <label data-ar="ملاحظات" data-en="Notes"></label>
      <textarea id="m-notes" data-ar-placeholder="أي معلومات إضافية..." data-en-placeholder="Any additional info..."></textarea>
    </div>
    <button class="btn-primary" onclick="saveMachine()" data-ar="حفظ الآلية" data-en="Save Machine"></button>
  </div>
</div>

<!-- MODAL: Add Cost -->
<div class="modal-overlay" id="modal-cost">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('modal-cost')">✕</button>
    <div class="modal-title" id="cost-modal-title"></div>
    <div class="form-group">
      <label data-ar="نوع التكلفة" data-en="Cost Type"></label>
      <select id="c-type">
        <option value="invoice" data-ar="فاتورة صيانة" data-en="Maintenance Invoice"></option>
        <option value="petty"   data-ar="بتي كاش"      data-en="Petty Cash"></option>
        <option value="debt"    data-ar="دين (كراج / شخص)" data-en="Debt (Garage / Person)"></option>
        <option value="rent"    data-ar="إيجار"         data-en="Rent"></option>
      </select>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label data-ar="المبلغ ($)" data-en="Amount ($)"></label>
        <input type="number" id="c-amount" placeholder="0.00" />
      </div>
      <div class="form-group">
        <label data-ar="التاريخ" data-en="Date"></label>
        <input type="date" id="c-date" />
      </div>
    </div>
    <div class="form-group">
      <label data-ar="الوصف / ماذا تصلح" data-en="Description / What was fixed"></label>
      <textarea id="c-desc" data-ar-placeholder="مثال: تغيير زيت + فلاتر..." data-en-placeholder="e.g. Oil change + filters..."></textarea>
    </div>
    <div class="form-group">
      <label data-ar="المورد / الكراج" data-en="Supplier / Garage"></label>
      <input type="text" id="c-supplier" data-ar-placeholder="اسم الكراج أو الشخص" data-en-placeholder="Garage or person name" />
    </div>
    <input type="hidden" id="c-machine-id" />
    <button class="btn-primary" onclick="saveCost()" data-ar="حفظ التكلفة" data-en="Save Cost"></button>
  </div>
</div>

<!-- MODAL: Detail -->
<div class="modal-overlay" id="modal-detail">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('modal-detail')">✕</button>
    <div class="modal-title" id="detail-title"></div>
    <div id="detail-content"></div>
  </div>
</div>

<!-- MODAL: Report -->
<div class="modal-overlay" id="modal-report">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('modal-report')">✕</button>
    <div class="modal-title" id="report-modal-title"></div>
    <div class="form-group">
      <label data-ar="النوع" data-en="Type"></label>
      <select id="r-type">
        <option value="maintenance" data-ar="🔧 صيانة"    data-en="🔧 Maintenance"></option>
        <option value="breakdown"   data-ar="🔴 بلاغ عطل" data-en="🔴 Breakdown Report"></option>
      </select>
    </div>
    <div class="form-group">
      <label data-ar="الوصف" data-en="Description"></label>
      <textarea id="r-desc" data-ar-placeholder="اشرح المشكلة أو ما تم..." data-en-placeholder="Describe the issue or what was done..."></textarea>
    </div>
    <div class="form-group">
      <label data-ar="التاريخ" data-en="Date"></label>
      <input type="date" id="r-date" />
    </div>
    <input type="hidden" id="r-machine-id" />
    <button class="btn-primary" onclick="saveReport()" data-ar="إرسال" data-en="Submit"></button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, doc, addDoc, getDocs, getDoc,
         updateDoc, query, where, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAK7cJ3jNXC0uCoo4fDkAsraq8eiZTr-uo",
  authDomain: "golden-nails-fleet.firebaseapp.com",
  projectId: "golden-nails-fleet",
  storageBucket: "golden-nails-fleet.firebasestorage.app",
  messagingSenderId: "73563212206",
  appId: "1:73563212206:web:a56728f31c51abf9a1603f"
};

const firebaseApp = initializeApp(firebaseConfig);
const auth = getAuth(firebaseApp);
const db   = getFirestore(firebaseApp);

// ── State ──
let currentUser  = null;
let userRole     = 'user';
let userProject  = null;
let allMachines  = [];
let currentLang  = localStorage.getItem('gnf-lang') || 'ar';

// ── i18n ──
const T = {
  ar: {
    loading: 'جاري التحميل...',
    noMachines: 'لا توجد آليات بعد',
    noCosts: 'لا توجد تكاليف مسجلة',
    noAlerts: 'لا توجد تنبيهات',
    noReports: 'لا توجد بلاغات',
    adminOnly: 'هذا القسم للمدير فقط',
    addCost: '+ إضافة تكلفة',
    addMachine: '+ إضافة آلية',
    details: 'تفاصيل',
    report: 'بلاغ',
    totalCosts: 'إجمالي التكاليف',
    grandTotal: 'الإجمالي الكلي',
    admin: 'مدير',

function t(key) { return T[currentLang][key] || key; }
function statusLabel(s) {
  return s === 'ok' ? t('statusOk') : s === 'maint' ? t('statusMaint') : t('statusBroken');
}
function statusClass(s) {
  return s === 'ok' ? 'status-ok' : s === 'maint' ? 'status-maint' : 'status-broken';
}

// ── Language ──
function applyLang() {
  const isAr = currentLang === 'ar';
  document.documentElement.lang = currentLang;
  document.documentElement.dir  = isAr ? 'rtl' : 'ltr';
  document.body.classList.toggle('lang-en', !isAr);

  // Update all data-ar / data-en elements
  document.querySelectorAll('[data-ar]').forEach(el => {
    const val = el.getAttribute(`data-${currentLang}`);
    if (val) {
      if (el.tagName === 'INPUT' || el.tagName === 'BUTTON' || el.tagName === 'TEXTAREA') {
        el.value = val;
      } else {
        el.textContent = val;
      }
    }
  });

  // Placeholders
  document.querySelectorAll('[data-ar-placeholder]').forEach(el => {
    el.placeholder = el.getAttribute(`data-${currentLang}-placeholder`) || '';
  });

  // Select options
  document.querySelectorAll('select option[data-ar]').forEach(opt => {
    opt.textContent = opt.getAttribute(`data-${currentLang}`) || opt.textContent;
  });

  // Lang buttons
  const authBtn = document.getElementById('auth-lang-btn');
  const appBtn  = document.getElementById('app-lang-btn');
  if (authBtn) authBtn.textContent = isAr ? 'English' : 'عربي';
  if (appBtn)  appBtn.textContent  = isAr ? 'EN' : 'ع';

  localStorage.setItem('gnf-lang', currentLang);
}

window.toggleLang = () => {
  currentLang = currentLang === 'ar' ? 'en' : 'ar';
  applyLang();
};

// ── Auth ──
window.doLogin = async () => {
  const email = document.getElementById('login-email').value.trim();
  const pass  = document.getElementById('login-pass').value;
  try {
    await signInWithEmailAndPassword(auth, email, pass);
  } catch(e) {
    document.getElementById('auth-error').style.display = 'block';
  }
};
window.doLogout = () => signOut(auth);

onAuthStateChanged(auth, async user => {
  if (user) {
    currentUser = user;
    const profileDoc = await getDoc(doc(db, 'users', user.uid));
    if (profileDoc.exists()) {
      const data = profileDoc.data();
      userRole    = data.role    || 'user';
      userProject = data.project || null;
    } else {
      userRole = 'admin';
    }
    showApp();
  } else {
    currentUser = null;
    document.getElementById('auth-screen').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
  }
});

function showApp() {
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('auth-error').style.display = 'none';

  const tag = document.getElementById('user-tag');
  if (userRole === 'admin') {
    tag.textContent = t('admin');
    tag.className = 'tag tag-admin';
    document.querySelectorAll('.admin-only').forEach(el => el.style.display = '');
  } else {
    tag.textContent = userProject || 'User';
    tag.className = 'tag tag-user';
  }
  applyLang();
  loadDashboard();
}

// ── Tabs ──
window.showTab = (tab) => {
  ['dashboard','machines','costs','reports'].forEach(t => {
    document.getElementById('tab-' + t).style.display = t === tab ? '' : 'none';
  });
  document.querySelectorAll('.nav-tab').forEach((el, i) => {
    el.classList.toggle('active', ['dashboard','machines','costs','reports'][i] === tab);
  });
  if (tab === 'machines') loadMachines();
  if (tab === 'costs')    loadCosts();
  if (tab === 'reports' && userRole === 'admin') loadReports();
};

// ── Dashboard ──
async function loadDashboard() {
  const snap = await getDocs(collection(db, 'machines'));
  allMachines = [];
  snap.forEach(d => allMachines.push({ id: d.id, ...d.data() }));

  const visible = userRole === 'admin' ? allMachines
    : allMachines.filter(m => m.project === userProject);

  document.getElementById('stat-total').textContent  = visible.length;
  document.getElementById('stat-maint').textContent  = visible.filter(m => m.status === 'maint').length;
  document.getElementById('stat-broken').textContent = visible.filter(m => m.status === 'broken').length;

  const costsSnap = await getDocs(collection(db, 'costs'));
  let total = 0;
  costsSnap.forEach(d => {
    const c = d.data();
    if (userRole === 'admin' || visible.find(m => m.id === c.machineId))
      total += parseFloat(c.amount || 0);
  });
  document.getElementById('stat-cost').textContent = total.toFixed(0);

  const alerts = visible.filter(m => m.status === 'broken' || m.status === 'maint');
  const alertsList = document.getElementById('alerts-list');
  alertsList.innerHTML = alerts.length === 0
    ? `<div class="empty"><div class="emoji">✅</div><p>${t('noAlerts')}</p></div>`
    : alerts.map(m => `
        <div class="alert-bubble ${m.status === 'broken' ? 'danger' : ''}">
          <strong>${m.name}</strong> — ${statusLabel(m.status)}<br>
          <small>${m.project}</small>
        </div>`).join('');
}

// ── Machines ──
async function loadMachines() {
  const list = document.getElementById('machines-list');
  list.innerHTML = `<div class="loader">${t('loading')}</div>`;
  const snap = await getDocs(collection(db, 'machines'));
  allMachines = [];
  snap.forEach(d => allMachines.push({ id: d.id, ...d.data() }));

  const visible = userRole === 'admin' ? allMachines
    : allMachines.filter(m => m.project === userProject);

  if (visible.length === 0) {
    list.innerHTML = `<div class="empty"><div class="emoji">🚜</div><p>${t('noMachines')}</p></div>`;
    return;
  }

  const byProject = {};
  visible.forEach(m => { if (!byProject[m.project]) byProject[m.project] = []; byProject[m.project].push(m); });

  list.innerHTML = Object.entries(byProject).map(([proj, machines]) => `
    <div class="section-title">${proj}</div>
    <div class="card">
      ${machines.map(m => `
        <div class="machine-item">
          <div class="machine-info">
            <div class="machine-name">${m.name}
              <span class="machine-status ${statusClass(m.status)}">${statusLabel(m.status)}</span>
            </div>
            <div class="machine-meta">${m.type} · ${m.brand || ''} · ${m.number || ''}</div>
          </div>
          <div>
            <button class="btn-sm btn-outline" onclick="openDetail('${m.id}')">${t('details')}</button>
            ${userRole !== 'admin' ? `<button class="btn-sm btn-danger-sm" onclick="openReport('${m.id}','${m.name}')">${t('report')}</button>` : ''}
          </div>
        </div>`).join('')}
    </div>`).join('');
}

// ── Costs ──
async function loadCosts() {
  const list = document.getElementById('costs-list');
  list.innerHTML = `<div class="loader">${t('loading')}</div>`;

  if (userRole !== 'admin') {
    list.innerHTML = `<div class="empty"><div class="emoji">🔒</div><p>${t('adminOnly')}</p></div>`;
    return;
  }

  const snap = await getDocs(collection(db, 'costs'));
  const costs = [];
  snap.forEach(d => costs.push({ id: d.id, ...d.data() }));

  if (costs.length === 0) {
    list.innerHTML = `
      <div class="empty"><div class="emoji">💰</div><p>${t('noCosts')}</p></div>
      <div style="text-align:center;margin-top:16px">
        <button class="btn-primary" style="width:auto;padding:10px 24px" onclick="openAddCost()">${t('addCost')}</button>
      </div>`;
    return;
  }

  const byType = { invoice: [], petty: [], debt: [], rent: [] };
  let total = 0;
  costs.forEach(c => { byType[c.type]?.push(c); total += parseFloat(c.amount || 0); });

  list.innerHTML = `
    <div style="text-align:${currentLang === 'ar' ? 'left' : 'right'};margin-bottom:12px">
      <button class="btn-sm btn-outline" onclick="openAddCost()">${t('addCost')}</button>
    </div>
    ${Object.entries(byType).filter(([,v]) => v.length).map(([type, items]) => {
      const sub = items.reduce((s, c) => s + parseFloat(c.amount || 0), 0);
      return `
        <div class="section-title">${t('costTypes')[type]} — $${sub.toFixed(2)}</div>
        <div class="card">
          ${items.map(c => {
            const machine = allMachines.find(m => m.id === c.machineId);
            return `<div class="machine-item">
              <div class="machine-info">
                <div class="machine-name">${c.desc || '—'}</div>
                <div class="machine-meta">${machine?.name || ''} · ${c.supplier || ''} · ${c.date || ''}</div>
              </div>
              <span class="cost-badge">$${parseFloat(c.amount).toFixed(2)}</span>
            </div>`;
          }).join('')}
        </div>`;
    }).join('')}
    <div class="report-total">
      <span>${t('grandTotal')}</span><span>$${total.toFixed(2)}</span>
    </div>`;
}

// ── Reports ──
async function loadReports() {
  const content = document.getElementById('reports-content');
  content.innerHTML = `<div class="loader">${t('loading')}</div>`;

  const [machineSnap, costsSnap, reportsSnap] = await Promise.all([
    getDocs(collection(db, 'machines')),
    getDocs(collection(db, 'costs')),
    getDocs(collection(db, 'reports'))
  ]);

  const machines = []; machineSnap.forEach(d => machines.push({ id: d.id, ...d.data() }));
  const costs    = []; costsSnap.forEach(d => costs.push(d.data()));
  const reports  = []; reportsSnap.forEach(d => reports.push(d.data()));

  const machineCosts = {};
  costs.forEach(c => { if (!machineCosts[c.machineId]) machineCosts[c.machineId] = 0; machineCosts[c.machineId] += parseFloat(c.amount || 0); });
  const totalAll = costs.reduce((s, c) => s + parseFloat(c.amount || 0), 0);

  content.innerHTML = `
    <div class="section-title">${t('reportsPerMachine')}</div>
    ${machines.map(m => {
      const cost = machineCosts[m.id] || 0;
      const mReports = reports.filter(r => r.machineId === m.id);
      return `<div class="card">
        <div class="card-header">
          <div><div class="card-title">${m.name}</div><div class="card-subtitle">${m.project} · ${m.type}</div></div>
          <span class="cost-badge">$${cost.toFixed(2)}</span>
        </div>
        ${mReports.length ? `<div style="font-size:12px;color:var(--muted)">${mReports.length} ${t('reportsLogged')}</div>` : ''}
      </div>`;
    }).join('')}
    <div class="report-total"><span>${t('grandTotal')}</span><span>$${totalAll.toFixed(2)}</span></div>`;
}

// ── Detail ──
window.openDetail = async (id) => {
  const m = allMachines.find(x => x.id === id);
  if (!m) return;
  document.getElementById('detail-title').textContent = m.name;

  const [costsSnap, reportsSnap] = await Promise.all([
    getDocs(query(collection(db, 'costs'),   where('machineId', '==', id))),
    getDocs(query(collection(db, 'reports'), where('machineId', '==', id)))
  ]);
  const costs   = []; costsSnap.forEach(d => costs.push(d.data()));
  const reps    = []; reportsSnap.forEach(d => reps.push(d.data()));
  const totalCost = costs.reduce((s, c) => s + parseFloat(c.amount || 0), 0);

  document.getElementById('detail-content').innerHTML = `
    <div class="report-row"><span class="report-label">${currentLang === 'ar' ? 'النوع' : 'Type'}</span><span class="report-value">${m.type}</span></div>
    <div class="report-row"><span class="report-label">${currentLang === 'ar' ? 'الماركة' : 'Brand'}</span><span class="report-value">${m.brand || '—'}</span></div>
    <div class="report-row"><span class="report-label">${currentLang === 'ar' ? 'الرقم' : 'Number'}</span><span class="report-value">${m.number || '—'}</span></div>
    <div class="report-row"><span class="report-label">${currentLang === 'ar' ? 'المشروع' : 'Project'}</span><span class="report-value">${m.project}</span></div>
    <div class="report-row"><span class="report-label">${currentLang === 'ar' ? 'الحالة' : 'Status'}</span><span class="report-value">${statusLabel(m.status)}</span></div>
    ${m.notes ? `<div class="report-row"><span class="report-label">${currentLang === 'ar' ? 'ملاحظات' : 'Notes'}</span><span class="report-value">${m.notes}</span></div>` : ''}
    ${userRole === 'admin' ? `
      <div class="section-title" style="margin-top:16px">${currentLang === 'ar' ? 'التكاليف' : 'Costs'} (${costs.length})</div>
      ${costs.length ? costs.map(c => `
        <div class="alert-bubble"><strong>${c.desc || '—'}</strong> · $${parseFloat(c.amount).toFixed(2)}<br><small>${c.supplier || ''} · ${c.date || ''}</small></div>
      `).join('') : `<p style="font-size:13px;color:var(--muted)">${t('noCosts')}</p>`}
      <div class="report-total" style="margin-top:8px"><span>${t('totalCosts')}</span><span>$${totalCost.toFixed(2)}</span></div>
      <br>
      <button class="btn-sm btn-outline" onclick="openAddCostForMachine('${id}','${m.name}')">${t('addCostBtn')}</button>
      <button class="btn-sm" style="background:#e8f5e9;color:#2e7d32;margin-right:6px" onclick="changeStatus('${id}')">${t('changeStatus')}</button>
    ` : ''}
    <div class="section-title" style="margin-top:16px">${currentLang === 'ar' ? 'البلاغات والصيانة' : 'Reports & Maintenance'} (${reps.length})</div>
    ${reps.length ? reps.map(r => `
      <div class="alert-bubble ${r.type === 'breakdown' ? 'danger' : ''}">
        <strong>${r.type === 'breakdown' ? t('breakdown') : t('maintenance')}</strong><br>
        ${r.desc}<br><small>${r.date || ''}</small>
      </div>`).join('') : `<p style="font-size:13px;color:var(--muted)">${t('noReports')}</p>`}
    ${userRole !== 'admin' ? `<br><button class="btn-primary" onclick="openReport('${id}','${m.name}')">${t('addCost')}</button>` : ''}
  `;
  document.getElementById('modal-detail').classList.add('open');
};

window.changeStatus = async (id) => {
  const m = allMachines.find(x => x.id === id);
  const next = m.status === 'ok' ? 'maint' : m.status === 'maint' ? 'broken' : 'ok';
  await updateDoc(doc(db, 'machines', id), { status: next });
  closeModal('modal-detail');
  loadMachines(); loadDashboard();
};

// ── Add Machine ──
window.openAddMachine = () => document.getElementById('modal-machine').classList.add('open');
window.saveMachine = async () => {
  const name = document.getElementById('m-name').value.trim();
  if (!name) return alert(t('enterName'));
  await addDoc(collection(db, 'machines'), {
    name, type: document.getElementById('m-type').value,
    brand: document.getElementById('m-brand').value.trim(),
    project: document.getElementById('m-project').value,
    number: document.getElementById('m-number').value.trim(),
    status: document.getElementById('m-status').value,
    notes: document.getElementById('m-notes').value.trim(),
    createdAt: serverTimestamp()
  });
  closeModal('modal-machine');
  loadMachines(); loadDashboard();
};

// ── Add Cost ──
window.openAddCost = () => {
  document.getElementById('cost-modal-title').textContent = t('addCostTitle');
  document.getElementById('c-machine-id').value = '';
  document.getElementById('c-date').value = new Date().toISOString().split('T')[0];
  document.getElementById('modal-cost').classList.add('open');
};
window.openAddCostForMachine = (id, name) => {
  closeModal('modal-detail');
  document.getElementById('cost-modal-title').textContent = `${t('costTitle')} ${name}`;
  document.getElementById('c-machine-id').value = id;
  document.getElementById('c-date').value = new Date().toISOString().split('T')[0];
  document.getElementById('modal-cost').classList.add('open');
};
window.saveCost = async () => {
  const amount = document.getElementById('c-amount').value;
  if (!amount) return alert(t('enterAmount'));
  await addDoc(collection(db, 'costs'), {
    machineId: document.getElementById('c-machine-id').value || null,
    type: document.getElementById('c-type').value,
    amount, date: document.getElementById('c-date').value,
    desc: document.getElementById('c-desc').value.trim(),
    supplier: document.getElementById('c-supplier').value.trim(),
    createdAt: serverTimestamp()
  });
  closeModal('modal-cost');
  loadCosts(); loadDashboard();
};

// ── Report ──
window.openReport = (id, name) => {
  closeModal('modal-detail');
  document.getElementById('report-modal-title').textContent = `${t('reportTitle')} ${name}`;
  document.getElementById('r-machine-id').value = id;
  document.getElementById('r-date').value = new Date().toISOString().split('T')[0];
  document.getElementById('modal-report').classList.add('open');
};
window.saveReport = async () => {
  const desc = document.getElementById('r-desc').value.trim();
  if (!desc) return alert(t('enterDesc'));
  const type = document.getElementById('r-type').value;
  const machineId = document.getElementById('r-machine-id').value;
  await addDoc(collection(db, 'reports'), {
    machineId, type, desc,
    date: document.getElementById('r-date').value,
    reportedBy: currentUser.email,
    createdAt: serverTimestamp()
  });
  if (type === 'breakdown')
    await updateDoc(doc(db, 'machines', machineId), { status: 'broken' });
  closeModal('modal-report');
  alert(t('sent'));
};

window.closeModal = (id) => document.getElementById(id).classList.remove('open');
document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', e => { if (e.target === el) el.classList.remove('open'); });
});

// Init
applyLang();
</script>
